---
- name: Configure DHCP server on Windows
  hosts: dhcp_servers
  gather_facts: false

  tasks:
    - name: Install DHCP role
      ansible.windows.win_feature:
        name: DHCP
        state: present
        include_management_tools: true
      register: dhcp_feature

    - name: Reboot if DHCP role installation requires it
      ansible.windows.win_reboot:
        reboot_timeout: 1800
        post_reboot_delay: 30
      when: dhcp_feature.reboot_required | default(false)

    - name: Run DHCP post-install security group configuration
      ansible.windows.win_powershell:
        script: |
          netsh dhcp add securitygroups
          Restart-Service DHCPServer -Force

    - name: Mark DHCP post-installation as completed in Server Manager
      ansible.windows.win_powershell:
        script: |
          Set-ItemProperty `
            -Path "registry::HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\ServerManager\Roles\12" `
            -Name "ConfigurationState" `
            -Value 2

    - name: Verify DHCP service exists
      ansible.windows.win_powershell:
        script: |
          $svc = Get-Service -Name "DHCPServer" -ErrorAction SilentlyContinue
          if ($null -eq $svc) {
            Write-Output "MISSING"
          }
          else {
            Write-Output "PRESENT"
          }
      register: dhcp_service_check

    - name: Stop if DHCP service is still missing
      ansible.builtin.fail:
        msg: >
          DHCPServer service is still missing after role installation and post-install configuration.
          Confirm this host is Windows Server and verify the DHCP role installed successfully.
      when: "'MISSING' in dhcp_service_check.output"

    - name: Authorize DHCP server in AD with credentials (Commit step)
      ansible.windows.win_powershell:
        script: |
          $ServerName = $env:COMPUTERNAME
          $DomainName = (Get-CimInstance Win32_ComputerSystem).Domain
          $Fqdn = "$ServerName.$DomainName"
          $IpAddress = "{{ dhcp_server_ip }}"

          $SecurePassword = ConvertTo-SecureString "{{ dhcp_auth_password }}" -AsPlainText -Force
          $Credential = New-Object System.Management.Automation.PSCredential ("{{ dhcp_auth_user }}", $SecurePassword)

          $existing = Get-DhcpServerInDC -ErrorAction SilentlyContinue | Where-Object {
            $_.DnsName -eq $Fqdn -or $_.IPAddress -eq $IpAddress
          }

          if (-not $existing) {
            Add-DhcpServerInDC `
              -DnsName $Fqdn `
              -IPAddress $IpAddress `
              -Credential $Credential
          }
      when: "'PRESENT' in dhcp_service_check.output"

    - name: Ensure DHCP scope exists
      ansible.windows.win_powershell:
        script: |
          $scope = Get-DhcpServerv4Scope -ErrorAction SilentlyContinue | Where-Object {
            $_.ScopeId -eq "{{ scope_subnet }}"
          }

          if (-not $scope) {
            Add-DhcpServerv4Scope `
              -Name "{{ scope_name }}" `
              -StartRange "{{ scope_start }}" `
              -EndRange "{{ scope_end }}" `
              -SubnetMask "{{ subnet_mask }}" `
              -State Active
          }
      when: "'PRESENT' in dhcp_service_check.output"

    - name: Set DHCP scope options
      ansible.windows.win_powershell:
        script: |
          $dnsServers = @({{ dns_servers | map('to_json') | join(', ') }})

          Set-DhcpServerv4OptionValue `
            -ScopeId "{{ scope_subnet }}" `
            -DnsDomain "{{ dns_domain }}" `
            -DnsServer $dnsServers `
            -Router "{{ gateway }}"
      when: "'PRESENT' in dhcp_service_check.output"

    - name: Set DHCP lease duration
      ansible.windows.win_powershell:
        script: |
          Set-DhcpServerv4Scope `
            -ScopeId "{{ scope_subnet }}" `
            -LeaseDuration "{{ lease_duration }}"
      when: "'PRESENT' in dhcp_service_check.output"

    - name: Ensure DHCP service is started
      ansible.windows.win_service:
        name: DHCPServer
        start_mode: auto
        state: started
      when: "'PRESENT' in dhcp_service_check.output"