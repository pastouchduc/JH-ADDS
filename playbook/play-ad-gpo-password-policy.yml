---
- name: Enforce domain password complexity policy
  hosts: domain_controllers
  gather_facts: false

  vars:
    domain_name: "hlab.local"
    min_password_length: 8
    password_history_count: 24
    max_password_age_days: 180
    min_password_age_days: 1
    complexity_enabled: true
    reversible_encryption_enabled: false

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - domain_name is defined
          - min_password_length is defined
          - password_history_count is defined
          - max_password_age_days is defined
          - min_password_age_days is defined
        fail_msg: "One or more required password policy variables are missing."

    - name: Enforce default domain password policy
      ansible.windows.win_powershell:
        script: |
          $domainName = "{{ domain_name }}"

          Set-ADDefaultDomainPasswordPolicy `
            -Identity $domainName `
            -ComplexityEnabled {{ '$true' if complexity_enabled else '$false' }} `
            -MinPasswordLength {{ min_password_length }} `
            -PasswordHistoryCount {{ password_history_count }} `
            -MaxPasswordAge ([TimeSpan]::FromDays({{ max_password_age_days }})) `
            -MinPasswordAge ([TimeSpan]::FromDays({{ min_password_age_days }})) `
            -ReversibleEncryptionEnabled {{ '$true' if reversible_encryption_enabled else '$false' }}

    - name: Verify resulting domain password policy
      ansible.windows.win_powershell:
        script: |
          Get-ADDefaultDomainPasswordPolicy -Identity "{{ domain_name }}" |
          Select-Object ComplexityEnabled,
                        MinPasswordLength,
                        PasswordHistoryCount,
                        MaxPasswordAge,
                        MinPasswordAge,
                        ReversibleEncryptionEnabled |
          ConvertTo-Json -Depth 3
      register: password_policy_result

    - name: Show resulting policy
      ansible.builtin.debug:
        var: password_policy_result.output